<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/style-pokedex.css">
    <link id="favicon" rel="icon" type="image/png" href="../assets/favicon.png">
</head>
<body>
    <div class="userbar" id="userbar">
        <div>
            <span id="userBarSaudacao"></span>
            <img src="../assets/img/usericon.png" alt="UserIcon" class="userBarIconDeslogado" id="userBarIcon">
            <a href="../html/login.html" style="text-decoration: none;" id="userBarLogin">Login</a>
            <a id="userBarLogout">Sair</a>
        </div>
    </div>
    
    <div class="bubbles-container">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>
    <div class="pokeballs-container">
        <div class="pokeball p-1"></div><div class="pokeball p-2"></div><div class="pokeball p-3"></div>
    </div>

    <header>
        <nav>
            <div class="logo">
                <img src="../assets/logo-pokedex.png" alt="Logo">
            </div>
            <ul>
                <li><a href="index.html" class="btn-nav">Início</a></li>
                <li><a href="mainpage.html" class="btn-nav active">Pokedex</a></li>
                <li><a href="compare.html" class="btn-nav">Comparar</a></li>
                <li><a href="favoritos.html" class="btn-nav">Favoritos</a></li>
                <li><a href="login.html" class="btn-nav">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-wrapper">
        <div class="search-sort-bar">
            <div class="search-container">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por nome ou número...">
            </div>
            <div class="sort-container" id="sortBtn">
                <span>⇅ </span>
                <span class="sort-text">Ordenar por: Número</span>
            </div>
        </div>

        <main class="pokemon-grid" id="pokemonGrid"></main>

        <div class="load-more-container">
            <button id="loadMoreBtn" onclick="carregarMais()">Carregar Mais</button>
        </div>
    </div>

    <button id="backToTop" onclick="scrollToTop()">↑</button>

    <script src="../js/script.js"></script>
</body>
</html>
