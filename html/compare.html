<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex - Compare</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/style-compare.css">
    <link id="favicon" rel="icon" type="image/png" href="../assets/favicon.png">
</head>
<body>
    <div class="userbar" id="userbar">
        <div>
            <span id="userBarSaudacao"></span>
            <img src="../assets/img/usericon.png" alt="UserIcon" class="userBarIconDeslogado" id="userBarIcon">
            <a href="../html/login.html" style="text-decoration: none;" id="userBarLogin">Login</a>
            <a id="userBarLogout">Sair</a>
        </div>
    </div>
    
    <div class="bubbles-container">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>
    <div class="pokeballs-container">
        <div class="pokeball p-1"></div><div class="pokeball p-2"></div><div class="pokeball p-3"></div>
    </div>

    <header>
        <nav>
            <a href="index.html" class="logo"><img src="../assets/logo-pokedex.png" alt="Logo"></a>
            <ul>
                <li><a href="index.html" class="btn-nav">Início</a></li>
                <li><a href="mainpage.html" class="btn-nav">Pokedex</a></li>
                <li><a href="compare.html" class="btn-nav active">Comparar</a></li>
                <li><a href="favoritos.html" class="btn-nav">Favoritos</a></li>
                <li><a href="login.html" class="btn-nav">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-div" id="banner-div">
            <div class="hero-banner">
                <div class="hero-content">
                    <h1>Compare <span>Pokemons!</span></h1>
                    <p>Compare todos os seus Pokemons favoritos</p>
                    <button class="btn-start" onclick="irParaSectionCompare()">COMECE AGORA</button>
                </div>
                <div class="hero-image"><img src="../assets/trio-pokemon.png" alt="Hero"></div>
            </div>
            <h3>Ultimas Comparações</h3>
            <div class="carousel-container" id="carouselContainerComparacao">
                <button class="arrow-btn left" onclick="scrollCarouselCompare(-1)">&#10094;</button>
                <div id="divUltimasComparacoes"></div>
                <button class="arrow-btn right" onclick="scrollCarouselCompare(1)">&#10095;</button>
            </div>
        </section>

        <section class="card-add-content" id="sectionCompare">
            <div class="card-add-empty" id="card1">
                <div class="card-add-empty-circle"><h1>+</h1></div>
            </div>

            <div id="vs-button">
                <div class="card-add-empty-circle h1">
                    <h3>VS</h3>
                </div>
                <button  onclick="battle()">Battle!</button>
            </div>

            <div class="card-add-empty" id="card2">
                <div class="card-add-empty-circle"><h1>+</h1></div>
            </div>
        </section>

    </main>

    <div class="modal-container" id="modal-container"></div>

    <script src="../js/script.js"></script>
</body>
</html>
