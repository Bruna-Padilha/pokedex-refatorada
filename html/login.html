<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex - Login</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/style-login.css">
    <link id="favicon" rel="icon" type="image/png" href="../assets/favicon.png">
</head>
<body>
    
    <div class="bubbles-container">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <div class="pokeballs-container">
        <div class="pokeball p-1"></div><div class="pokeball p-2"></div><div class="pokeball p-8"></div>
    </div>

    <header>
        <nav>
            <div class="logo"><img src="../assets/logo-pokedex.png" alt="Logo"></div>
            <ul>
                <li><a href="index.html" class="btn-nav">Início</a></li>
                <li><a href="mainpage.html" class="btn-nav">Pokedex</a></li>
                <li><a href="compare.html" class="btn-nav">Comparar</a></li>
                <li><a href="favoritos.html" class="btn-nav">Favoritos</a></li>
                <li><a href="login.html" class="btn-nav active">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-card-container">

        <!-- Personagens -->
        <img src="../assets/img/pikachu.png" alt="Pikachu" class="char char--left">
        <img src="../assets/img/pikachu.png" alt="Squirtle" class="char char--right">

        <!-- Card de login -->
        <div class="login-card">
            <h1 class="login-card__title">Login</h1>

            <form class="login-form" action="/login" method="POST">

            <div class="form-field">
                <label for="usuario" class="form-field__label">Usuário</label>
                <input id="usuario" type="text" name="usuario"
                    class="form-field__input" autocomplete="username">
            </div>

            <div class="form-field">
                <label for="senha" class="form-field__label">Senha</label>
                <input id="senha" type="password" name="senha"
                    class="form-field__input" autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn--primary">Entrar</button>

            </form>
        </div>

    </main>

    <script src="../js/script.js"></script>
</body>
</html>
